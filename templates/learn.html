<!DOCTYPE html>
<html>
<head>
  <title>Lesson {{ step }}</title>
  <link rel="stylesheet" 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') 
}}">
</head>
<body>
  <div class="container py-4">
    <div class="progress mb-4">
      <div class="progress-bar" style="width: {{ (step / total * 100)|int 
}}%"></div>
    </div>
    <h2>{{ lesson.title }}</h2>
    <p class="text-muted">{{ lesson.subtitle }}</p>

    {% if lesson.signals %}
    <div class="row mt-4">
      {% for signal in lesson.signals %}
      <div class="col-md-4 mb-3">
        <div class="card h-100 p-3">
          <h5>{{ loop.index }}. {{ signal.name }}</h5>
          <p>{{ signal.description }}</p>
        </div>
      </div>
      {% endfor %}
    </div>
    {% endif %}

    <div class="mt-4">
      {% if step < total %}
        <a href="/learn/{{ step + 1 }}" class="btn btn-primary">Next 
→</a>
      {% else %}
        <a href="/quiz/1" class="btn btn-success">Take the Quiz →</a>
      {% endif %}
    </div>
  </div>
</body>
</html>
