{% extends "base.html" %}

{% block title %}Lesson {{ n }} — {{ lesson.title }}{% endblock %}

{% block content %}
<div class="text-muted small mb-2">Lesson {{ n }} of {{ total }}</div>
<h1 class="mb-4">{{ lesson.title }}</h1>

<div class="alert alert-light border">
  <p class="mb-1"><strong>Lesson type:</strong> <code>{{ lesson.type }}</code></p>
  <p class="mb-0 text-muted">Rich rendering for this lesson type comes in a later commit.</p>
</div>

<div class="d-flex justify-content-between mt-4">
  <a href="/" class="btn btn-outline-secondary">Home</a>
  <a href="{{ next_url }}" class="btn btn-primary">Next &rarr;</a>
</div>
{% endblock %}
