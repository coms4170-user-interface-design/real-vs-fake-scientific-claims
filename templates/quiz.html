<!DOCTYPE html>
<html>
<head>
  <title>Quiz Question {{ question }}</title>
  <link rel="stylesheet" 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') 
}}">
  <script src="{{ url_for('static', filename='quiz.js') }}" 
defer></script>
</head>
<body>
  <div class="container py-4">
    <div class="progress mb-4">
      <div class="progress-bar bg-success" style="width: {{ (question / 
total * 100)|int }}%"></div>
    </div>
    <p class="text-muted">Question {{ question }} of {{ total }}</p>
    <h3 class="mb-4">{{ q.text }}</h3>

    <form method="POST" action="/quiz/{{ question }}" id="quiz-form">
      {% for opt in q.options %}
      <div class="option-card mb-2 p-3" data-value="{{ opt.label }}" 
onclick="selectOption(this, '{{ q.type }}')">
        <strong>{{ opt.label }})</strong> {{ opt.text }}
        <input type="checkbox" name="answer" value="{{ opt.label }}" 
class="d-none opt-input">
      </div>
      {% endfor %}
      <button type="submit" id="submit-btn" class="btn btn-primary mt-3" 
disabled>Submit</button>
    </form>
  </div>
</body>
</html>
