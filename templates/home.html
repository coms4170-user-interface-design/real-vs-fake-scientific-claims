{% extends "base.html" %}

{% block title %}Real vs. Fake Scientific Claims{% endblock %}

{% block content %}
<div style="min-height: 90vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem;">
  <div style="margin-bottom: 1.5rem;">
    <span style="background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); padding: 0.4rem 1rem; border-radius: 999px; font-size: 0.8rem; letter-spacing: 0.08em; color: rgba(255,255,255,0.6); text-transform: uppercase;">Digital Literacy</span>
  </div>
  <h1 style="font-size: clamp(2.2rem, 6vw, 4.5rem); font-weight: 700; line-height: 1.1; max-width: 800px; margin-bottom: 1.5rem; letter-spacing: -0.02em;">
    Can you spot a fake<br>
    <span style="background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">scientific claim?</span>
  </h1>
  <p style="color: rgba(255,255,255,0.45); font-size: 1.1rem; max-width: 480px; line-height: 1.7; margin-bottom: 2.5rem; font-weight: 300; letter-spacing: 0.01em;">
    A short interactive lesson on spotting misleading health posts using three signals.
  </p>
  <form action="/start" method="post">
    <button type="submit" style="background: linear-gradient(135deg, #38bdf8, #818cf8); border: none; color: white; font-size: 1rem; font-weight: 600; padding: 0.85rem 2.5rem; border-radius: 999px; cursor: pointer; letter-spacing: 0.02em; transition: opacity 0.2s;" onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'">
      Start the lesson
    </button>
  </form>
</div>
{% endblock %}
