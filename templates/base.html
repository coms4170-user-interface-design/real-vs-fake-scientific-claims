<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Real vs. Fake Scientific Claims{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    body {
      background-color: #0a0a0f;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .card {
      background: #13131a;
      border: 1px solid rgba(255,255,255,0.08) !important;
      color: #e2e8f0;
    }
    .text-muted { color: rgba(255,255,255,0.4) !important; }
    .btn-outline-secondary {
      color: rgba(255,255,255,0.5);
      border-color: rgba(255,255,255,0.15);
      background: transparent;
      border-radius: 999px;
    }
    .btn-outline-secondary:hover {
      background: rgba(255,255,255,0.06);
      color: white;
      border-color: rgba(255,255,255,0.3);
    }
    .btn-primary {
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      border: none;
      border-radius: 999px;
      font-weight: 600;
    }
    .btn-primary:hover { opacity: 0.85; background: linear-gradient(135deg, #38bdf8, #818cf8); }
    .badge.bg-primary-subtle {
      background: rgba(56,189,248,0.15) !important;
      color: #38bdf8 !important;
      border: 1px solid rgba(56,189,248,0.3);
    }
    /* progress stepper dark */
    .progress-step { background: #1e1e2e; border-color: rgba(255,255,255,0.15); }
    .progress-step.done { background: #38bdf8; border-color: #38bdf8; }
    .progress-step.active { background: #0a0a0f; border-color: #38bdf8; box-shadow: 0 0 0 3px rgba(56,189,248,0.25); }
    .progress-connector { background: rgba(255,255,255,0.1); }
    .progress-connector.done { background: #38bdf8; }
    /* signal cards */
    .signal-card-teal { background: rgba(8,145,178,0.12); border-left: 3px solid #0dcaf0 !important; }
    .signal-card-yellow { background: rgba(202,138,4,0.12); border-left: 3px solid #fbbf24 !important; }
    .signal-card-red { background: rgba(185,28,28,0.12); border-left: 3px solid #ef4444 !important; }
    .badge-teal { background: rgba(8,145,178,0.2); color: #38bdf8; border: 1px solid rgba(56,189,248,0.3); border-radius: 999px; padding: 0.2rem 0.7rem; font-size: 0.75rem; font-weight: 600; }
    .badge-yellow { background: rgba(202,138,4,0.2); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); border-radius: 999px; padding: 0.2rem 0.7rem; font-size: 0.75rem; font-weight: 600; }
    .badge-red { background: rgba(185,28,28,0.2); color: #f87171; border: 1px solid rgba(248,113,113,0.3); border-radius: 999px; padding: 0.2rem 0.7rem; font-size: 0.75rem; font-weight: 600; }
    .post-card-dark { background: #13131a; border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; }
    .post-highlight-dark { background: rgba(251,191,36,0.1); border-left: 3px solid #fbbf24; border-radius: 8px; padding: 0.75rem 1rem; }
    .scenario-q-dark { background: rgba(56,189,248,0.06); border: 1px solid rgba(56,189,248,0.2); border-radius: 12px; padding: 1.5rem; text-align: center; }
    .ann-red { background: rgba(185,28,28,0.12); border-left: 3px solid #ef4444; border-radius: 10px; padding: 1rem; margin-bottom: 0.75rem; }
    .ann-teal { background: rgba(8,145,178,0.12); border-left: 3px solid #0dcaf0; border-radius: 10px; padding: 1rem; margin-bottom: 0.75rem; }
    .ann-yellow { background: rgba(202,138,4,0.12); border-left: 3px solid #fbbf24; border-radius: 10px; padding: 1rem; margin-bottom: 0.75rem; }
    .good-card { background: rgba(20,83,45,0.2); border: 1px solid rgba(34,197,94,0.2) !important; border-radius: 14px; }
    .bad-card { background: rgba(127,29,29,0.2); border: 1px solid rgba(239,68,68,0.2) !important; border-radius: 14px; }
    .good-header { background: rgba(34,197,94,0.1); border-bottom: 1px solid rgba(34,197,94,0.15); padding: 1rem 1.25rem; border-radius: 14px 14px 0 0; }
    .bad-header { background: rgba(239,68,68,0.1); border-bottom: 1px solid rgba(239,68,68,0.15); padding: 1rem 1.25rem; border-radius: 14px 14px 0 0; }
    blockquote { border-left: 3px solid rgba(255,255,255,0.15) !important; color: rgba(255,255,255,0.6) !important; }
    .footnote-bar { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 1rem; text-align: center; }
  </style>
</head>
<body>
  <main class="container py-5">
    {% block content %}{% endblock %}
  </main>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      fetch("/api/track", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ type: "page_enter", path: window.location.pathname }),
      });
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
